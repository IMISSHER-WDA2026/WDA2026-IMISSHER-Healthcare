name: Sync RAG Space to Hugging Face

on:
  push:
    branches: [ "main" ]
    paths: 
      - "ai/spaces/rag/**"
      - "ai/data/first_aid_knowledge.csv"

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Clone the empty Hugging Face RAG space
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/penguneedLLM/healthcare-rag-api hf-space
          
          # Sync the RAG app files
          rsync -av --delete ai/spaces/rag/ hf-space/ --exclude .git/
          
          # Create the data folder and inject the required CSV
          mkdir -p hf-space/data
          cp ai/data/first_aid_knowledge.csv hf-space/data/
          
          # Push to Hugging Face
          cd hf-space
          git add .
          git commit -m "Auto-sync RAG Space from GitHub" || echo "No changes to commit"
          git push