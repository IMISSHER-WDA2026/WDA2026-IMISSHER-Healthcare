name: Sync Face Space to Hugging Face

on:
  push:
    branches: [ "main" ]
    paths: [ "ai/spaces/face/**" ]

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Clone the empty Hugging Face space
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/penguneedLLM/healthcare-face-api hf-space

          # Sync the contents of the face folder into the Space, excluding git history
          rsync -av --delete ai/spaces/face/ hf-space/ --exclude .git/

          # Push the changes
          cd hf-space
          git add .
          git commit -m "Auto-sync Face Space from GitHub" || echo "No changes to commit"
          git push