2version: '3.8'
services:
  postgres-db:
    # Sử dụng image đặc biệt có sẵn pgvector cho tính năng AI Face Recognition
    image: ankane/pgvector:latest
    container_name: imissher_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: imissher_local_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: