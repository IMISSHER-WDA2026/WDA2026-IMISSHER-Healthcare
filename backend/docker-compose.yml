services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: imissher_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:password123@postgres-db:5432/imissher_local_db}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-true}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-imissher-dev-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      FACE_RECOGNITION_API_URL: ${FACE_RECOGNITION_API_URL:-http://imissher_ai:8001/api/v1/face/recognize}
      FACE_RECOGNITION_MATCH_THRESHOLD: ${FACE_RECOGNITION_MATCH_THRESHOLD:-0.82}
      IMISSHER_DATA_DIR: /app/.runtime-data
      IMISSHER_UPLOAD_DIR: /app/.runtime-data/uploads
      IMISSHER_MEDICINE_DATA_DIR: /opt/imissher-ai-data
      IMISSHER_TEST_ACCOUNT_EMAIL: ${IMISSHER_TEST_ACCOUNT_EMAIL:-test@imissher.dev}
      IMISSHER_TEST_ACCOUNT_PASSWORD: ${IMISSHER_TEST_ACCOUNT_PASSWORD:-Test@123456}
      IMISSHER_TEST_ACCOUNT_FULL_NAME: ${IMISSHER_TEST_ACCOUNT_FULL_NAME:-Tai Khoan Test IMISSHER}
    ports:
      - '3000:3000'
    depends_on:
      - ai
      - postgres-db
    volumes:
      - backend_runtime:/app/.runtime-data
      - ../ai/data:/opt/imissher-ai-data:ro

  ai:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: imissher_ai
    restart: unless-stopped
    ports:
      - '8001:8001'
    volumes:
      - ../ai/data:/app/data:ro

  postgres-db:
    image: ankane/pgvector:latest
    container_name: imissher_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: imissher_local_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  backend_runtime:
  pgdata: