services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcare_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:password123@postgres-db:5432/healthcare_local_db}
      TYPEORM_SYNCHRONIZE: ${TYPEORM_SYNCHRONIZE:-true}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in the environment (min 32 chars)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      FACE_RECOGNITION_API_URL: ${FACE_RECOGNITION_API_URL:-http://healthcare_ai:8001/api/v1/face/recognize}
      FACE_RECOGNITION_API_TOKEN: ${FACE_RECOGNITION_API_TOKEN:-}
      FACE_RECOGNITION_REQUEST_MODE: ${FACE_RECOGNITION_REQUEST_MODE:-multipart}
      FACE_RECOGNITION_TIMEOUT_MS: ${FACE_RECOGNITION_TIMEOUT_MS:-120000}
      FACE_RECOGNITION_MATCH_THRESHOLD: ${FACE_RECOGNITION_MATCH_THRESHOLD:-0.82}
      RAG_MODEL_API_URL: ${RAG_MODEL_API_URL:-}
      RAG_MODEL_API_TOKEN: ${RAG_MODEL_API_TOKEN:-}
      RAG_MODEL_TIMEOUT_MS: ${RAG_MODEL_TIMEOUT_MS:-120000}
      HEALTHCARE_MEDICINE_DATA_DIR: /opt/healthcare-ai-data
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_UPLOADS_BUCKET: ${SUPABASE_UPLOADS_BUCKET:-uploads}
      HEALTHCARE_TEST_ACCOUNT_EMAIL: ${HEALTHCARE_TEST_ACCOUNT_EMAIL:-test@healthcare.dev}
      HEALTHCARE_TEST_ACCOUNT_PASSWORD: ${HEALTHCARE_TEST_ACCOUNT_PASSWORD:-Test@123456}
      HEALTHCARE_TEST_ACCOUNT_FULL_NAME: ${HEALTHCARE_TEST_ACCOUNT_FULL_NAME:-Tai Khoan Test Healthcare}
    ports:
      - '3000:3000'
    depends_on:
      - ai
      - postgres-db
    volumes:
      - ../ai/data:/opt/healthcare-ai-data:ro

  ai:
    build:
      context: ../ai
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.face.txt
    container_name: healthcare_ai
    restart: unless-stopped
    environment:
      PORT: 8001
    ports:
      - '8001:8001'
    volumes:
      - ../ai/data:/app/data:ro

  postgres-db:
    image: ankane/pgvector:latest
    container_name: healthcare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: healthcare_local_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: