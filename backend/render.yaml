services:
  - type: web
    name: healthcare-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TYPEORM_SYNCHRONIZE
        value: "false"
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: https://your-sos-web.vercel.app
      - key: ENABLE_SWAGGER
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: FACE_RECOGNITION_API_URL
        value: https://your-face-space.hf.space/api/v1/face/recognize
      - key: FACE_RECOGNITION_API_TOKEN
        sync: false
      - key: FACE_RECOGNITION_REQUEST_MODE
        value: multipart
      - key: FACE_RECOGNITION_MATCH_THRESHOLD
        value: "0.82"
      - key: RAG_MODEL_API_URL
        value: https://your-rag-space.hf.space/api/v1/rag/answer
      - key: RAG_MODEL_API_TOKEN
        sync: false
      - key: HEALTHCARE_TEST_ACCOUNT_EMAIL
        value: test@healthcare.dev
      - key: HEALTHCARE_TEST_ACCOUNT_PASSWORD
        value: Test@123456
      - key: HEALTHCARE_TEST_ACCOUNT_FULL_NAME
        value: Tai Khoan Test Healthcare
